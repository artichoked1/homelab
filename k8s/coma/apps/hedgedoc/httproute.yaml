apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hedgedoc
  namespace: hedgedoc
spec:
  parentRefs:
    - name: web-gateway
      namespace: networking
      sectionName: artichoke-cc-https
  hostnames:
    - hedgedoc.artichoke.cc
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hedgedoc
          port: 3000
