apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./ks.yaml
  - ./ns.yaml
  - ./app/helmrelease.yaml
  - ./app/httproute.yaml
configMapGenerator:
  - name: ntfy-config
    files:
      - ./app/config/server.yml
    options:
      disableNameSuffixHash: true
namespace: ntfy
