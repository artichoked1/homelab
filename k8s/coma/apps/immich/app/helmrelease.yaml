---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: immich
  namespace: immich
spec:
  interval: 5m
  url: oci://ghcr.io/immich-app/immich-charts/immich
  ref:
    tag: "0.13.1"
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 1m

  chartRef:
    kind: OCIRepository
    name: immich
    namespace: immich

  values:
    controllers:
      main:
        containers:
          main:
            env:
              REDIS_HOSTNAME: "main.redis-clusters.svc.cluster.local"

    immich:
      metrics:
        enabled: true

      persistence:
        library:
          existingClaim: immich-uploads-pvc

      configuration:
        server:
          externalDomain: "https://immich.artichoke.cc"

        trash:
          enabled: true
          days: 30

        storageTemplate:
          enabled: true
          template: "{{y}}/{{album}}/{{ext}}/{{filename}}"

        machineLearning:
          enabled: true
          urls:
            - http://world-trade-centre-1.artichoke.network:3003
            - http://192.168.188.167:3003
            - http://immich-machine-learning:3003

        oauth:
          enabled: true
          autoRegister: true
          buttonText: "Sign in with Artichoke Technologies"
          clientId: ${IMMICH_OAUTH_CLIENT_ID}
          clientSecret: ${IMMICH_OAUTH_CLIENT_SECRET}
          issuerUrl: "https://auth.artichoke.cc/application/o/immich/.well-known/openid-configuration"

        notifications:
          smtp:
            enabled: true
            from: "Immich Photo Server <${NOREPLY_EMAIL}>"
            replyTo: ${NOREPLY_EMAIL}
            transport:
              host: ${NOREPLY_EMAIL_HOST}
              port: 465
              secure: true
              username: ${NOREPLY_EMAIL}
              password: ${NOREPLY_EMAIL_PASS}

    valkey:
      enabled: false

    server:
      enabled: true

      controllers:
        main:
          containers:
            main:
              env:
                DB_HOSTNAME: "immich-postgres-v4-rw.databases.svc.cluster.local"
                DB_USERNAME:
                  valueFrom:
                    secretKeyRef:
                      name: immich-postgres-auth
                      key: username
                DB_DATABASE_NAME: "immich"
                DB_PASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: immich-postgres-auth
                      key: password

      serviceMonitor:
        main:
          labels:
            release: prometheus-stack

      persistence:
        nsfiles:
          enabled: true
          type: persistentVolumeClaim
          existingClaim: immich-nsfiles-pvc
          advancedMounts:
            main:
              main:
                - path: /media/nsphotos
                  readOnly: true

    machine-learning:
      enabled: true
      persistence:
        cache:
          enabled: true
          type: persistentVolumeClaim
          size: 10Gi
          accessMode: ReadWriteMany
          storageClass: longhorn
