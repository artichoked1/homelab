apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: rabbitmq
  namespace: flux-system
spec:
  interval: 5m
  url: oci://registry-1.docker.io/bitnamicharts/
  type: oci
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rabbitmq
  namespace: onlyoffice-docserver
spec:
  chart:
    spec:
      chart: rabbitmq
      version: 16.0.14
      sourceRef:
        kind: HelmRepository
        name: rabbitmq
        namespace: flux-system
      interval: 5m

  interval: 1m0s
  values:
    metrics:
      enabled: true
      serviceMonitor:
        labels:
          release: rabbitmq
    auth:
      username: onlyoffice
      existingPasswordSecret: "onlyoffice-docserver-rabbitmq-auth"
      existingSecretPasswordKey: "password"
    image:
      repository: bitnamilegacy/rabbitmq
      tag: 4.1.3-debian-12-r1
    global:
      security:
        allowInsecureImages: true
